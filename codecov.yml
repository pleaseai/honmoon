coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 70%
        threshold: 5%

comment:
  layout: "reach, diff, flags, files"
  require_changes: true

flags:
  rust:
    paths:
      - crates/

ignore:
  - "apps/dashboard/**"
  - "**/*.test.ts"
  - "**/tests/**"
