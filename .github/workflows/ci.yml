name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust — fmt, clippy, test, coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - uses: taiki-e/install-action@9458fed45835344deb5e69e06e831be047c96abf # cargo-llvm-cov

      - name: Test + coverage
        run: cargo llvm-cov --workspace --all-targets --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust
          fail_ci_if_error: false

  js:
    name: JS — lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
        # No JS test suite yet — re-add `bun test` here once packages/* have tests.

  pii-benchmark:
    name: PII — Tier-1 benchmark gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build PII scan bridge
        run: cargo build -p honmoon-core --example pii_scan

      # Gold sets are committed as deterministic generators with pinned seeds, so CI
      # reproduces the same corpus on every run. KDPII (download-only, CC-BY) is excluded.
      - name: Generate gold sets
        run: |
          mkdir -p target/pii
          bun datasets/pii/build/gen_synth.ts    > target/pii/synth.jsonl
          bun datasets/pii/build/gen_negative.ts > target/pii/negative.jsonl

      - name: Predict
        run: |
          ./target/debug/examples/pii_scan < target/pii/synth.jsonl    > target/pii/synth.pred.jsonl
          ./target/debug/examples/pii_scan < target/pii/negative.jsonl > target/pii/negative.pred.jsonl

      - name: Gate — Tier-1 micro F1 and per-type floors
        run: bun datasets/pii/gate.ts synth target/pii/synth.jsonl target/pii/synth.pred.jsonl

      - name: Gate — FR6 (hard-negative FP budget)
        run: bun datasets/pii/gate.ts negative target/pii/negative.jsonl target/pii/negative.pred.jsonl
