name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust — fmt, clippy, test, coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - uses: taiki-e/install-action@c6d51ded7cde3c421f6cd6046cd601f2248f3710 # cargo-llvm-cov

      - name: Test + coverage
        run: cargo llvm-cov --workspace --all-targets --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust
          fail_ci_if_error: false

  js:
    name: JS — lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
        # No JS test suite yet — re-add `bun test` here once packages/* have tests.

  pii-benchmark:
    name: PII — Tier-1 benchmark gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build PII scan bridge
        run: cargo build -p honmoon-core --example pii_scan

      # Gold sets are seeded/deterministic, so CI regenerates them — no vendored
      # corpora. KDPII (download-only, CC-BY) is excluded from the gate.
      - name: Generate gold sets
        run: |
          mkdir -p target/pii
          bun datasets/pii/build/gen_synth.ts    > target/pii/synth.jsonl
          bun datasets/pii/build/gen_negative.ts > target/pii/negative.jsonl

      - name: Predict
        run: |
          ./target/debug/examples/pii_scan < target/pii/synth.jsonl    > target/pii/synth.pred.jsonl
          ./target/debug/examples/pii_scan < target/pii/negative.jsonl > target/pii/negative.pred.jsonl

      - name: Gate — AC1 (synth per-label F1 + precision floor)
        run: bun datasets/pii/gate.ts synth target/pii/synth.jsonl target/pii/synth.pred.jsonl

      - name: Gate — FR6 (hard-negative FP budget)
        run: bun datasets/pii/gate.ts negative target/pii/negative.jsonl target/pii/negative.pred.jsonl
