<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Honmoon — runtime security between AI agents and production</title>
    <script>
      // Activate the `.lp` hidden-initial state synchronously (before first paint)
      // so above-the-fold sections don't flash visible → hidden → fade in.
      // Skip when IntersectionObserver is unavailable or the user prefers reduced
      // motion, so sections stay visible without the reveal transition.
      (function () {
        try {
          var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches
          if (!reduced && 'IntersectionObserver' in window) {
            document.documentElement.classList.add('od-js')
          }
        }
        catch {
          /* matchMedia unavailable — leave sections visible (no reveal gating) */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
