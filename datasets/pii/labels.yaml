# Honmoon canonical PII label set + source mapping
#
# Honmoon owns the canonical label keys. Every dataset source (KDPII, ko-pii, Presidio output)
# is absorbed into these keys via the `map:` blocks below. Unmapped source labels are scored as
# `O` (excluded) and listed in `unmapped:`. See docs/pii-benchmark-goals.md §6.4.
#
# Fields per label:
#   tier            1 deterministic (checksum/structure) | 2 format/dictionary | 3 quasi-identifier
#   severity        high | medium | low   — blocking value (drives default_action)
#   method          how Tier-1/2 detect it: checksum | luhn | regex | regex+keyword | dictionary | ner
#   default_action  TENTATIVE policy default: deny | pause | audit  (finalize in open questions)
#   ref_f1          ko-pii measured F1 on KDPII (BENCHMARK.md), for target tracking; null if unpublished
#   map:
#     ko_pii        ko-pii category (MIT) — confirmed from README/BENCHMARK
#     presidio      Presidio entity (MIT) — confirmed from supported_entities.md; null = not supported
#     kdpii         KDPII label code — TODO: confirm against KDPII test.json (Zenodo 10968609)
#
# version: 0.1.0 (draft)

labels:
  # ── Tier 1 — deterministic / high blocking value ───────────────────────────
  RRN:
    desc: 주민등록번호 (resident registration number)
    tier: 1
    severity: high
    method: checksum
    default_action: deny
    ref_f1: 1.000
    map: { ko_pii: RRN, presidio: KR_RRN, kdpii: null }
  FRN:
    desc: 외국인등록번호 (foreign registration number)
    tier: 1
    severity: high
    method: checksum
    default_action: deny
    ref_f1: 1.000
    map: { ko_pii: FRN, presidio: KR_FRN, kdpii: null }
  BUSINESS_REG_NO:
    desc: 사업자등록번호 (business registration number)
    tier: 1
    severity: high
    method: checksum
    default_action: pause
    ref_f1: null
    map: { ko_pii: 사업자등록번호, presidio: KR_BRN, kdpii: null }
  CORP_REG_NO:
    desc: 법인등록번호 (corporate registration number)
    tier: 1
    severity: high
    method: checksum
    default_action: pause
    ref_f1: null
    map: { ko_pii: 법인등록번호, presidio: null, kdpii: null }
  DRIVER_LICENSE:
    desc: 운전면허번호 (driver's license number)
    tier: 1
    severity: high
    method: regex
    default_action: deny
    ref_f1: null
    map: { ko_pii: 운전면허번호, presidio: KR_DRIVER_LICENSE, kdpii: null }
  PASSPORT:
    desc: 여권번호 (passport number)
    tier: 1
    severity: high
    method: regex
    default_action: deny
    ref_f1: 0.909
    map: { ko_pii: PASSPORT, presidio: KR_PASSPORT, kdpii: null }
  CREDIT_CARD:
    desc: 신용카드번호 (BIN + Luhn)
    tier: 1
    severity: high
    method: luhn
    default_action: deny
    ref_f1: null
    map: { ko_pii: 신용카드, presidio: CREDIT_CARD, kdpii: null }
  ACCOUNT:
    desc: 계좌번호 (bank account number)
    tier: 1
    severity: high
    method: regex+keyword
    default_action: pause
    ref_f1: 0.819
    map: { ko_pii: 계좌번호, presidio: null, kdpii: null }
  EMAIL:
    desc: 이메일 주소 (email address)
    tier: 1
    severity: medium
    method: regex
    default_action: audit
    ref_f1: 1.000
    map: { ko_pii: EMAIL, presidio: EMAIL_ADDRESS, kdpii: null }
  IP:
    desc: IP 주소 (IPv4/IPv6)
    tier: 1
    severity: low
    method: regex
    default_action: audit
    ref_f1: 1.000
    map: { ko_pii: IP, presidio: IP_ADDRESS, kdpii: null }
  PHONE:
    desc: 전화번호 (phone number)
    tier: 1
    severity: medium
    method: regex
    default_action: audit
    ref_f1: 0.992
    map: { ko_pii: PHONE, presidio: PHONE_NUMBER, kdpii: null }
  VEHICLE:
    desc: 차량번호 (vehicle plate)
    tier: 1
    severity: low
    method: regex
    default_action: audit
    ref_f1: 0.980
    map: { ko_pii: VEHICLE, presidio: null, kdpii: null }

  # ── Tier 2 — format / dictionary, keyword-anchored ─────────────────────────
  POSTAL_CODE:
    desc: 우편번호 (postal code)
    tier: 2
    severity: low
    method: regex
    default_action: audit
    ref_f1: null
    map: { ko_pii: 우편번호, presidio: null, kdpii: null }
  URL:
    desc: URL
    tier: 2
    severity: low
    method: regex
    default_action: audit
    ref_f1: null
    map: { ko_pii: URL, presidio: URL, kdpii: null }
  MEDICAL_ID:
    desc: 의료 식별자 (건강보험증 / 처방번호 / 의약품코드)
    tier: 2
    severity: high
    method: regex+keyword
    default_action: pause
    ref_f1: null
    map: { ko_pii: [건강보험증, 처방번호, 의약품코드], presidio: null, kdpii: null }
  EMPLOYEE_ID:
    desc: 사번 (employee id)
    tier: 2
    severity: medium
    method: regex+keyword
    default_action: audit
    ref_f1: null
    map: { ko_pii: 사번, presidio: null, kdpii: null }
  CASE_NO:
    desc: 사건번호 / 민원번호 (case / civil-complaint number)
    tier: 2
    severity: medium
    method: regex+keyword
    default_action: audit
    ref_f1: null
    map: { ko_pii: [사건번호, 민원번호], presidio: null, kdpii: null }
  DOB:
    desc: 생년월일 (date of birth)
    tier: 2
    severity: medium
    method: regex
    default_action: audit
    ref_f1: null
    map: { ko_pii: 생년월일, presidio: DATE_TIME, kdpii: null }
  AGE:
    desc: 나이 (age)
    tier: 2
    severity: low
    method: regex+keyword
    default_action: audit
    ref_f1: 0.893
    map: { ko_pii: 나이, presidio: null, kdpii: null }

  # ── Tier 3 — quasi-identifiers / context-dependent (NER assist) ─────────────
  PERSON:
    desc: 인명 (person name)
    tier: 3
    severity: medium
    method: ner
    default_action: audit
    ref_f1: 0.135
    map: { ko_pii: PERSON, presidio: PERSON, kdpii: null }
  ADDRESS:
    desc: 주소 (address)
    tier: 3
    severity: high
    method: ner
    default_action: pause
    ref_f1: 0.241
    map: { ko_pii: ADDRESS, presidio: LOCATION, kdpii: null }
  NATIONALITY:
    desc: 국적 (nationality)
    tier: 3
    severity: low
    method: dictionary
    default_action: audit
    ref_f1: null
    map: { ko_pii: NATIONALITY, presidio: NRP, kdpii: null }
  EDUCATION:
    desc: 학력 / 전공 (education / major)
    tier: 3
    severity: low
    method: dictionary
    default_action: audit
    ref_f1: null
    map: { ko_pii: [EDUCATION, MAJOR], presidio: null, kdpii: null }
  POSITION:
    desc: 직책 (job position / title)
    tier: 3
    severity: low
    method: dictionary
    default_action: audit
    ref_f1: null
    map: { ko_pii: POSITION, presidio: null, kdpii: null }

# Source labels intentionally NOT mapped to a canonical key (scored as O / excluded).
# Populate after inventorying each source; e.g. ko-pii HEIGHT/WEIGHT, PNU.
unmapped:
  ko_pii: [HEIGHT, WEIGHT, PNU, 팩스번호, 공문서번호]
  presidio: []
  kdpii: []   # TODO: list KDPII codes with no canonical home after inventorying test.json (Zenodo 10968609)

