  RRN:
    desc: 주민등록번호 (resident registration number)
    tier: 1
    severity: high
    method: checksum
    default_action: deny
    ref_f1: 1.000
    map: {ko_pii: RRN, presidio: KR_RRN, kdpii: QT_RESIDENT_NUMBER}
